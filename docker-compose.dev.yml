version: "3.8"
services:
  db:
    image: mysql:8.0
    restart: always
    env_file: .env
    networks:
      - crawler_net
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASS}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASS}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password

  selenium:
    image: seleniarm/standalone-chromium:latest
    ports:
      - "4444:4444"
    env_file: .env
    networks:
      - crawler_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4444/wd/hub/status"]
      interval: 5s
      timeout: 10s
      retries: 5

  crawler:
    build: .
    depends_on:
      selenium:
        condition: service_healthy
    env_file: .env
    networks:
      - crawler_net
    environment:
      - SELENIUM_URL=http://selenium:4444/wd/hub
      - TZ=Asia/Seoul
    command: ["python", "crawler.py"]

networks:
  crawler_net:

volumes:
  db_data: